version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge

responses:
  utter_greet:
  - text: "你好！最近怎么样？"

  utter_cheer_up:
  - text: "给你看点开心的："
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
  - text: "有没有好一点？"

  utter_happy:
  - text: "那就好，继续加油！"

  utter_goodbye:
  - text: "再见～"

  utter_iamabot:
  - text: "我是算命大师。"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
