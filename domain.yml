version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - ask_tarot

slots:
  question:
    type: text
    mappings:
      - type: from_text
  spread_type:
    type: text
    mappings:
      - type: from_text

forms:
  tarot_form:
    required_slots:
      - question
      - spread_type

responses:
  utter_greet:
  - text: "你好！最近怎么样？"

  utter_cheer_up:
  - text: "给你看点开心的："
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
  - text: "有没有好一点？"

  utter_happy:
  - text: "那就好，继续加油！"

  utter_goodbye:
  - text: "再见～"

  utter_iamabot:
  - text: "我是算命大师。"

  utter_ask_question:
  - text: "您想问哪方面的问题？例如感情、事业、财运，或随便说说心里在意的都行。"

  utter_ask_spread_type:
  - text: "想用哪种牌阵？单张快问、三张（过去现在未来）、还是凯尔特十字？"

  utter_tarot_confirm:
  - text: "好的，您问的是「{question}」，用「{spread_type}」来占。稍后给您解读～"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

actions:
  - action_hello_world
  - action_submit_tarot